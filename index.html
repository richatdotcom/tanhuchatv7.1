<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANHUTOWN v7.5</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        body { background-color: #050505; color: #00ff41; font-family: 'Fira Code', monospace; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; background-size: cover; background-position: center; transition: background-image 0.8s ease; }
        #broadcast-bar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0, 255, 65, 0.1); border-bottom: 1px solid #00ff41; height: 30px; z-index: 1000; overflow: hidden; display: flex; align-items: center; backdrop-filter: blur(5px); }
        .marquee { white-space: nowrap; animation: marquee 20s linear infinite; padding-left: 100%; font-size: 0.8em; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        #terminal { width: 98vw; max-width: 1200px; height: 85vh; margin-top: 30px; border: 1px solid #00ff41; display: flex; flex-direction: column; background: rgba(13, 13, 13, 0.7); position: relative; z-index: 5; backdrop-filter: blur(10px); }
        #main-content { display: flex; flex: 1; overflow: hidden; }
        
        #user-sidebar { width: 260px; border-right: 1px solid #008f11; display: flex; flex-direction: column; background: rgba(0,0,0,0.4); }
        #user-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; font-size: 0.85em; }
        
        /* Cyber Radio UI */
        #radio-widget { border-top: 2px solid #00ccff; padding: 15px; background: rgba(0, 20, 40, 0.6); }
        .radio-title { color: #00ccff; font-size: 0.7em; margin-bottom: 8px; font-weight: bold; text-shadow: 0 0 8px #00ccff; }
        #radio-player { width: 100%; height: 30px; outline: none; border-radius: 5px; filter: invert(1) hue-rotate(180deg) brightness(1.5); }

        #overseer-panel { border-top: 1px solid #ff00ff; padding: 10px; display: none; background: rgba(20, 0, 20, 0.5); font-size: 0.7em; }
        #admin-context-menu { display: none; position: fixed; background: #0d0d0d; border: 1px solid #00ff41; z-index: 3000; width: 220px; box-shadow: 5px 5px 20px black; }
        .context-item { padding: 12px; font-size: 0.75em; cursor: pointer; font-weight: bold; border-bottom: 1px solid #1a1a1a; }
        .item-radio { color: #00ccff; } .item-ban { color: #ff0000; } .item-priv { color: #ff00ff; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .log-line { font-size: 0.85em; line-height: 1.4; border-bottom: 1px solid rgba(0, 255, 65, 0.05); padding-bottom: 4px; }
        #input-line { display: flex; gap: 10px; border-top: 1px solid #008f11; padding: 10px; }
        #message-input { flex: 1; background: transparent; border: none; color: #00ff41; outline: none; }
        #send-btn { background: #00ff41; border: none; padding: 8px 15px; cursor: pointer; color: #000; font-weight: bold; }
        #login-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:4000; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="broadcast-bar"><div class="marquee" id="broadcast-text">TANHUTOWN v7.5 GÜVENLİ RADYO PROTOKOLÜ...</div></div>

<div id="admin-context-menu">
    <div class="context-item item-radio" id="btn-ctx-radio">RADYOYU GÜNCELLE</div>
    <div class="context-item item-ban" id="btn-ctx-ban">BİRİMİ MÜHÜRLE</div>
    <div class="context-item item-priv" id="btn-ctx-priv">ARKA ODAYA GEÇELİM</div>
</div>

<div id="terminal">
    <div id="login-screen">
        <input type="text" id="username-input" placeholder="Rumuz girin..." style="background:transparent; border:none; border-bottom:1px solid #00ff41; color:#00ff41; text-align:center; outline:none; font-family:'Fira Code';">
    </div>

    <div id="main-content">
        <aside id="user-sidebar">
            <ul id="user-list"></ul>
            <div id="overseer-panel"></div>
            <div id="radio-widget">
                <div class="radio-title">TANHU FM 104.0</div>
                <audio id="radio-player" controls preload="auto" crossorigin="anonymous"></audio>
            </div>
        </aside>
        <section id="chat-area" style="display:flex; flex-direction:column; flex:1;">
            <div id="messages"></div>
            <div id="input-line">
                <input type="text" id="message-input" autocomplete="off">
                <button id="send-btn" onclick="sendMessage()">İLET</button>
            </div>
        </section>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://texttanhu-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = localStorage.getItem('chatUser');
    let isAdmin = false;
    let deviceId = localStorage.getItem('tanhutown_device_id') || 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    localStorage.setItem('tanhutown_device_id', deviceId);

    function startApp() {
        document.getElementById('login-screen').style.display = 'none';
        isAdmin = (currentUser === "TANHU");
        
        // RADYO GÜNCELLEME (KRİTİK FİX)
        db.ref('settings/radio_url').on('value', snap => {
            const player = document.getElementById('radio-player');
            const url = snap.val();
            if (url) {
                player.pause();
                player.src = url;
                player.load();
                // Kullanıcı bir kez sayfaya tıkladıysa çalmaya başlar
                const playPromise = player.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Oynatma için kullanıcı etkileşimi gerekiyor.");
                    });
                }
            }
        });

        listenLists(); loadMessages();
    }

    function showMenu(e, type, data) {
        e.preventDefault();
        const menu = document.getElementById('admin-context-menu');
        const b = { 
            rad: document.getElementById('btn-ctx-radio'),
            ban: document.getElementById('btn-ctx-ban'),
            priv: document.getElementById('btn-ctx-priv')
        };
        Object.values(b).forEach(i => i.style.display = 'none');

        if (isAdmin) {
            b.rad.style.display = 'block';
            b.rad.onclick = () => {
                const url = prompt("ÇALIŞAN BİR RADYO URL (Mutlaka HTTPS önerilir):", "https://shaincast.fastcast4u.com/proxy/dzmlyp_sh?mp=/stream");
                if (url) db.ref('settings/radio_url').set(url);
            };
            if(type === 'user') b.ban.style.display = 'block';
        }
        if(type === 'user' && data.name !== currentUser) b.priv.style.display = 'bold';

        menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
    }

    // Çalışan radyo linklerini denemen için şu ikisini Lord panelinden girebilirsin:
    // 1. https://shaincast.fastcast4u.com/proxy/dzmlyp_sh?mp=/stream (Slow Türk tarzı)
    // 2. https://n10101.ottstream.ot.io/joyfm/tracks.m3u8 (Joy FM)

    function loadMessages() {
        db.ref('lobi').on('value', snap => {
            const container = document.getElementById('messages'); container.innerHTML = '';
            const data = snap.val();
            for(let id in data) {
                const m = data[id];
                const div = document.createElement('div'); div.className = 'log-line';
                div.innerHTML = `<b>${m.gonderen}</b>: ${m.mesaj}`;
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        });
    }

    function listenLists() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list'); list.innerHTML = '';
            const users = snap.val() || {};
            for(let name in users) {
                const li = document.createElement('li');
                li.innerHTML = `<span class="status-dot online"></span> ${name}`;
                li.oncontextmenu = (e) => showMenu(e, 'user', {name});
                list.appendChild(li);
            }
        });
    }

    function sendMessage() {
        const val = document.getElementById('message-input').value;
        if(val.trim()) {
            db.ref('lobi').push({gonderen:currentUser, mesaj:val, timestamp: Date.now()});
            document.getElementById('message-input').value = '';
        }
    }

    document.getElementById('username-input').onkeypress = (e) => {
        if(e.key === 'Enter') {
            const n = e.target.value.trim().toUpperCase();
            if(n === "TANHU") {
                if(prompt("KEY:") === "3169") { currentUser = n; startApp(); }
            } else { currentUser = n; startApp(); }
        }
    };
    if(currentUser) startApp();
    window.onclick = () => document.getElementById('admin-context-menu').style.display = 'none';
</script>
</body>
</html>
